name: Free GPT-4 API (ChatAnywhere)

on:
  workflow_dispatch:

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Call free GPT-4 API
        run: |
          curl -s "https://api.chatanywhere.tech/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer sk-2pTwqS9p8RupyD4b74kKACJkMYKuR0dsQwNvwtaeH8R8YOb0" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [{"role": "user", "content": "سلام"}]
            }' | jq -r '.choices[0].message.content' > chat.i
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chat.i"
          file_pattern: "chat.i"