name: ChatGPT No Login (Via AnonChatGPT)

on:
  workflow_dispatch:

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Send message to AnonChatGPT
        run: |
          curl -s "https://anonchatgpt.com/api/chat" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"message": "سلام"}' > chat.i
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chat.i"
          file_pattern: "chat.i"