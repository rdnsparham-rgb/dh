name: Llama 3.1 via GitHub Models

on:
  workflow_dispatch:

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read  # مهم: دسترسی به GitHub Models
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Call Llama 3.1 via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s "https://models.inference.github.io/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d '{
              "model": "Meta-Llama-3.1-8B-Instruct",
              "messages": [{"role": "user", "content": "سلام"}]
            }' | jq -r '.choices[0].message.content' > chat.i
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chat.i with Llama 3.1 response"
          file_pattern: "chat.i"