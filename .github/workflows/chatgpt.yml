name: ChatGPT Guest Mode

on:
  workflow_dispatch:

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install
      
      - name: Run ChatGPT automation
        run: |
          agent-browser open "https://chatgpt.com"
          sleep 5
          echo "Site opened at $(date)" > chat.i
          agent-browser close
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chat.i"
          file_pattern: "chat.i"