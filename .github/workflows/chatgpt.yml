name: ChatGPT Guest Mode - Full

on:
  workflow_dispatch:

jobs:
  chat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install agent-browser
        run: |
          npm install -g agent-browser
          agent-browser install
      
      - name: Send message and get response
        run: |
          agent-browser open "https://chatgpt.com"
          sleep 5
          
          # تایپ کردن "سلام" در کادر متن
          agent-browser type --selector "textarea" "سلام"
          sleep 2
          
          # کلیک روی دکمه ارسال
          agent-browser click --selector "button" --text "Send" || agent-browser click --selector "[data-testid='send-button']" || agent-browser click --selector "button:has(svg)"
          sleep 15
          
          # گرفتن متن پاسخ
          agent-browser get-text --selector "[data-message-author-role='assistant']" > response.txt
          
          # ذخیره در فایل chat.i
          echo "Response at $(date):" > chat.i
          cat response.txt >> chat.i
          
          agent-browser close
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update chat.i with ChatGPT response"
          file_pattern: "chat.i"